name: Hermes适配器
desc: Hermes Agent 适配器 (WebSocket 版本) - 实现 AstrBot 与 Hermes 的双向通信
help: |
  Hermes × AstrBot 双向协同适配器 (WebSocket 版本)

  ✨ 为什么需要双向协同？
  AstrBot 擅长即时交互和社区管理，Hermes 擅长复杂任务和深度思考。
  两者协同，让 AI 既能快速响应群聊，又能处理需要多步骤、多工具的复杂任务。

  🔄 协同架构：
  ┌─────────────┐    消息转发    ┌─────────────┐
  │   AstrBot   │ ────────────→ │   Hermes    │
  │  (QQ 群聊)  │ ←──────────── │  (Agent)    │
  └─────────────┘    指令调用    └─────────────┘

  📡 核心功能：
  - 群聊消息：支持关键词触发、@触发、转发所有消息
  - 私聊消息：v3.4.0+ 支持，自动识别并转发
  - HTTP API：让 Hermes 调用 AstrBot 的所有插件指令
  - LLM 工具：让 AstrBot 的 AI 调用 Hermes 执行复杂任务
  - 智能分流：可配置冲突策略（hermes_only / both / llm_only）

  🎯 协同优势：
  ┌────────────────────────────────────────────────────┐
  │ AstrBot 提供：              Hermes 提供：          │
  │ - 点歌、表情包、meme       - 代码执行、文件操作    │
  │ - 好感度、宠物、签到       - 网页浏览、定时任务    │
  │ - 群管理、复读、今日运势   - 多平台支持、持久记忆  │
  │ - 丰富的社区插件生态       - 强大的 Agent 能力     │
  └────────────────────────────────────────────────────┘
  → 两者互通，能力互补，用户只需一个入口

  📖 使用场景示例：
  1. 用户：@机器人 点歌 让风告诉你
     → AstrBot 直接处理，调用点歌插件

  2. 用户：@机器人 帮我分析这个群的聊天活跃度
     → AstrBot LLM 识别为复杂任务 → 调用 Hermes
     → Hermes 执行群分析指令 → 结果返回群聊

  3. Hermes 收到请求：帮我查一下宠物状态
     → 调用 HTTP API → AstrBot 执行宠物插件 → 返回结果

  🎮 管理指令：
  /hermes status - 查看适配器状态（连接、缓存、统计）
  /hermes test  - 测试与 Hermes 的 WebSocket 连接

  🔧 LLM 工具（AstrBot AI 可调用）：
  hermes_agent         - 调用 Hermes 执行任务或指令
  hermes_status        - 查询 Hermes 运行状态
  hermes_list_commands - 列出可用的 AstrBot 指令

  🌐 HTTP API（Hermes 可调用）：
  GET  /api/health          - 健康检查
  GET  /api/commands        - 列出所有指令
  GET  /api/commands/for_hermes - 分类好的指令列表
  GET  /api/command/<name>  - 获取指令详情
  POST /api/execute         - 执行 AstrBot 指令
  POST /api/send            - 直接发送消息到群

  ⚙️ 配置说明：
  - 触发关键词：默认 纳西妲、hermes、Hermes
  - 允许的群组/用户：留空表示所有
  - 冲突处理策略：hermes_only / both / llm_only

  📋 技术架构：
  用户 (QQ)
      ↓ 群聊/私聊消息
  AstrBot (NapCat)
      ↓ 消息监听
  Hermes适配器插件
      ├→ WebSocket → Hermes Agent (处理复杂任务)
      └→ HTTP API ← Hermes Agent (调用 AstrBot 指令)

  📝 版本历史：
  v3.4.0 - 新增私聊支持
  v3.3.0 - WebSocket 版本重构

  🔗 相关链接：
  GitHub: https://github.com/landamao/abpl_hermes_spq
  插件目录: /root/AstrBot/data/plugins/Hermes适配器/
